# Wi-Fi survives A/B updates (field fix 2026-07-23). NetworkManager stores
# connection profiles in /etc/NetworkManager/system-connections, but /etc is
# part of the per-slot root — so a Wi-Fi saved on the old slot is gone after
# an update+reboot, leaving the box with no network (no DNS → downloads fail).
# The postinst symlinks that dir to here, on the persistent /var partition;
# these entries make sure the target exists (0700, as NetworkManager requires)
# before NetworkManager starts.
d /var/lib/NetworkManager 0755 root root -
d /var/lib/NetworkManager/system-connections 0700 root root -
