# Root slot updates from GitHub Releases (the update channel). The
# releases/latest/download URL always redirects to the newest release,
# so every install sees new versions from one fixed URL. Verify=no until
# GPG-signed manifests land (M1 hardening); transport is HTTPS +
# SHA256SUMS integrity.
[Transfer]
Verify=no

[Source]
Type=url-file
Path=https://github.com/Lisa-AgenticOS/lisa-os/releases/latest/download/
MatchPattern=lisa_@v.root.xz

[Target]
Type=partition
Path=auto
MatchPattern=root_@v
MatchPartitionType=root
InstancesMax=2
