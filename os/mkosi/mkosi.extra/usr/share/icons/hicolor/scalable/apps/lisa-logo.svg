<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Lisa OS">
  <title>Lisa OS</title>
  <defs>
    <linearGradient id="lisaBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D63FF"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <radialGradient id="lisaOrb" cx="0.40" cy="0.34" r="0.85">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.60" stop-color="#FFEEDF"/>
      <stop offset="1" stop-color="#FFD3B8"/>
    </radialGradient>
    <clipPath id="lisaOrbClip">
      <circle cx="256" cy="250" r="120"/>
    </clipPath>
  </defs>
  <!-- Calm, intelligent indigo frame -->
  <rect x="24" y="24" width="464" height="464" rx="132" fill="url(#lisaBg)"/>
  <!-- A warm presence it holds — yours, on your machine -->
  <circle cx="256" cy="250" r="120" fill="url(#lisaOrb)"/>
  <!-- Gentle warm crescent depth, clipped to the orb -->
  <g clip-path="url(#lisaOrbClip)">
    <circle cx="322" cy="304" r="132" fill="#E8794C" opacity="0.15"/>
  </g>
  <!-- Soft highlight -->
  <ellipse cx="214" cy="206" rx="40" ry="28" fill="#FFFFFF" opacity="0.6"/>
</svg>
