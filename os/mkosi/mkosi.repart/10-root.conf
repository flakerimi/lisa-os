# Root slot A (ADR-0001 A/B layout). Fixed size so the B slot can hold a
# byte-identical partition image; label carries the sysupdate version
# (root_@v pattern in /etc/sysupdate.d). dm-verity hash partitions are
# the next step after the sysupdate flow is proven.
# 8G (was 5G pre-desktop): the GNOME session adds ~1.5-2 GiB installed;
# 5G left no headroom over the ~3 GiB base. MUST match 11-root-b.conf —
# sysupdate writes this slot's byte image into the other. Whole layout
# (1G ESP + 2x8G root + >=2G var) = 19 GiB, inside the smallest field
# target disk (28,000,002,048 bytes ~= 26 GiB); needs a 32 GB stick.
[Partition]
Type=root
Format=btrfs
CopyFiles=/
Label=root_1
SizeMinBytes=8G
SizeMaxBytes=8G
