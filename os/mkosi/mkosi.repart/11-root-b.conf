# Root slot B: empty at build, filled by systemd-sysupdate with the next
# version's root image. The "_empty" label is sysupdate's convention for
# an available slot. Unformatted on purpose — the update writes a
# complete filesystem image over it.
# 8G to match 10-root.conf exactly — the update is a byte image of the
# A slot.
[Partition]
Type=root
Label=_empty
SizeMinBytes=8G
SizeMaxBytes=8G
