# Lisa OS image profile (Track I, ADR-0001). M0 target: boots in QEMU via
# `just vm` with A/B update + rollback demonstrated (PLAN §10).
#
# Build on Linux only: `mkosi --directory os/mkosi build` (CI's job —
# .github/workflows/nightly.yml). The pinned Arch snapshot mirror
# (os/repo-tools) replaces the default mirrors before beta.

[Distribution]
Distribution=arch

[Output]
Format=disk
ImageId=lisa
Output=lisa

[Content]
Bootable=yes
Hostname=lisa
Packages=
        base
        linux
        linux-firmware
        systemd
        systemd-ukify
        btrfs-progs
        iwd
        sudo
        vim

[Validation]
# Signed UKI + SecureBoot keys wired in once the M0 boot test is green.
SecureBoot=no
