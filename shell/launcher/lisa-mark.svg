<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Lisa OS">
  <title>Lisa OS</title>
  <defs>
    <linearGradient id="lisaViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D45C9"/>
      <stop offset="1" stop-color="#4F378B"/>
    </linearGradient>
  </defs>
  <!-- Violet tile: the icon slot where the wordmark can't fit -->
  <rect x="24" y="24" width="464" height="464" rx="132" fill="url(#lisaViolet)"/>
  <!-- L monogram, drawn from the wordmark's spirit -->
  <g fill="#FFFFFF">
    <rect x="188" y="140" width="64" height="232" rx="32"/>
    <rect x="188" y="308" width="150" height="64" rx="32"/>
  </g>
</svg>
