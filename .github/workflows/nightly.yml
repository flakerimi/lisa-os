# Nightly image pipeline (PLAN §6). Builds the Track I image and
# boot-checks it in QEMU. Runs inside a real Arch container (rootful
# podman, privileged) so mkosi uses Arch's own pacman — the default
# Debian tools tree on Ubuntu runners ships a pacman without its cache
# dir. swtpm + the A/B sysupdate rollback demo complete the M0 gate.

name: nightly-image

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Expose /dev/kvm
        run: |
          if [ -e /dev/kvm ]; then sudo chmod 666 /dev/kvm; else echo "no KVM; QEMU will fall back to TCG"; fi
      - name: Build image in Arch container
        run: |
          sudo podman run --rm --privileged \
            -v "$PWD":/src -w /src docker.io/library/archlinux:latest bash -ec '
              # pacman >= 7 sandbox cannot apply inside the container
              sed -i "/^\[options\]/a DisableSandbox" /etc/pacman.conf
              pacman -Syu --noconfirm mkosi
              mkosi --directory os/mkosi summary
              mkosi --directory os/mkosi build
            '
          # Outputs were written by root inside the container.
          sudo chown -R "$USER:" os/mkosi
      # Boot on the runner host with plain QEMU (mkosi qemu needs a
      # systemd host, which the container is not). Direct kernel boot to
      # poweroff.target: reaching poweroff exits QEMU cleanly; a hang is
      # caught by the timeout; "Welcome to" proves systemd came up from
      # the image's own initrd + root.
      - name: Boot check (QEMU)
        run: |
          set -o pipefail
          sudo apt-get update -qq
          sudo apt-get install -qq -y --no-install-recommends qemu-system-x86 >/dev/null
          timeout 600 qemu-system-x86_64 \
            -machine q35 -accel kvm -accel tcg -m 4G -nographic -no-reboot \
            -kernel os/mkosi/lisa.vmlinuz -initrd os/mkosi/lisa.initrd \
            -append "root=/dev/vda2 rw console=ttyS0 systemd.unit=poweroff.target systemd.show_status=1" \
            -drive file=os/mkosi/lisa.raw,format=raw,if=virtio \
            | tee boot-console.log
          grep -q "Welcome to" boot-console.log
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: lisa-image
          path: os/mkosi/lisa*.raw
          if-no-files-found: warn
          retention-days: 7

  # M0 acceptance (PLAN §10): A/B update + rollback demonstrated. A
  # broken higher-version UKI with +2 try counters is preferred by
  # systemd-boot, fails twice (initrd timeout -> reboot), exhausts its
  # tries, and the good entry boots automatically. Real UEFI via OVMF —
  # this exercises systemd-boot itself, unlike the direct-kernel job.
  ab-rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: image
    steps:
      - name: Download built image
        uses: actions/download-artifact@v4
        with:
          name: lisa-image
      - name: Stage A/B demo UKIs in the ESP (mtools, no rebuild)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y --no-install-recommends \
            mtools fdisk jq binutils systemd-ukify systemd-boot-efi >/dev/null
          ls -l lisa*.raw
          # ESP = partition 1; mtools addresses it as an offset into the raw.
          OFF=$(( $(sfdisk -J lisa.raw | jq -r '.partitiontable.partitions[0].start') * 512 ))
          ESP="lisa.raw@@$OFF"
          NAME=$(mdir -b -i "$ESP" ::/EFI/Linux/ | grep -o 'lisa-[^/]*\.efi' | head -1)
          echo "good UKI: $NAME (ESP offset $OFF)"
          mcopy -i "$ESP" "::/EFI/Linux/$NAME" good.efi
          # The mkosi UKI carries no .cmdline section, so rebuild demo
          # variants properly with ukify from its kernel + initrd.
          objcopy --dump-section .linux=vmlinuz --dump-section .initrd=initrd.img good.efi discard.efi
          UKIFY=$(command -v ukify || echo /usr/lib/systemd/ukify)
          # Good entry: serial console + clean poweroff so QEMU exits on
          # success. No try counters = permanently valid entry.
          "$UKIFY" build --linux=vmlinuz --initrd=initrd.img \
            --cmdline='root=/dev/vda2 rw console=ttyS0 lisa_demo=good systemd.unit=poweroff.target' \
            --output=good-demo.efi
          # Bad entry: version 99 outranks the good entry. It boots but
          # immediately reboots (systemd.unit=reboot.target) without ever
          # reaching boot-complete — a deterministic failed boot that
          # burns a try per cycle. (A broken-root variant drops to an
          # emergency shell and hangs instead of rebooting.)
          "$UKIFY" build --linux=vmlinuz --initrd=initrd.img \
            --cmdline='root=/dev/vda2 rw console=ttyS0 lisa_demo=bad systemd.unit=reboot.target' \
            --output=bad-demo.efi
          mcopy -o -i "$ESP" good-demo.efi "::/EFI/Linux/$NAME"
          mcopy -i "$ESP" bad-demo.efi "::/EFI/Linux/lisa-99+2.efi"
          mdir -i "$ESP" ::/EFI/Linux/
      - name: Boot-counting rollback demo (UEFI QEMU)
        run: |
          set -o pipefail
          sudo apt-get install -qq -y --no-install-recommends qemu-system-x86 ovmf >/dev/null
          cp /usr/share/OVMF/OVMF_VARS_4M.fd vars.fd
          # No -no-reboot: the failed tries MUST reboot for the counters
          # to decrement. Success = good entry powers off -> QEMU exits.
          timeout 900 qemu-system-x86_64 \
            -machine q35 -accel kvm -accel tcg -m 4G -nographic \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd \
            -drive if=pflash,format=raw,file=vars.fd \
            -drive file=lisa.raw,format=raw,if=virtio \
            | tee console.log
          echo "--- assertions"
          grep -q "lisa_demo=bad" console.log
          grep -q "lisa_demo=good" console.log
          BAD=$(grep -n "lisa_demo=bad" console.log | head -1 | cut -d: -f1)
          GOOD=$(grep -n "lisa_demo=good" console.log | head -1 | cut -d: -f1)
          [ "$BAD" -lt "$GOOD" ]
          grep -q "Welcome to" console.log
          echo "ROLLBACK DEMO: PASS (bad tried first at line $BAD, good booted at line $GOOD)"
