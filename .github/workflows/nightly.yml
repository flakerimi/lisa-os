# Nightly image pipeline (PLAN §6). Builds the Track I image and
# boot-checks it in QEMU. Runs inside a real Arch container (rootful
# podman, privileged) so mkosi uses Arch's own pacman — the default
# Debian tools tree on Ubuntu runners ships a pacman without its cache
# dir. swtpm + the A/B sysupdate rollback demo complete the M0 gate.

name: nightly-image

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Expose /dev/kvm
        run: |
          if [ -e /dev/kvm ]; then sudo chmod 666 /dev/kvm; else echo "no KVM; QEMU will fall back to TCG"; fi
      - name: Build image in Arch container
        run: |
          sudo podman run --rm --privileged \
            -v "$PWD":/src -w /src docker.io/library/archlinux:latest bash -ec '
              # pacman >= 7 sandbox cannot apply inside the container
              sed -i "/^\[options\]/a DisableSandbox" /etc/pacman.conf
              pacman -Syu --noconfirm mkosi
              mkosi --directory os/mkosi summary
              mkosi --directory os/mkosi build
            '
          # Outputs were written by root inside the container.
          sudo chown -R "$USER:" os/mkosi
      # Boot on the runner host with plain QEMU (mkosi qemu needs a
      # systemd host, which the container is not). Direct kernel boot to
      # poweroff.target: reaching poweroff exits QEMU cleanly; a hang is
      # caught by the timeout; "Welcome to" proves systemd came up from
      # the image's own initrd + root.
      - name: Boot check (QEMU)
        run: |
          set -o pipefail
          sudo apt-get update -qq
          sudo apt-get install -qq -y --no-install-recommends qemu-system-x86 >/dev/null
          timeout 600 qemu-system-x86_64 \
            -machine q35 -accel kvm -accel tcg -m 4G -nographic -no-reboot \
            -kernel os/mkosi/lisa.vmlinuz -initrd os/mkosi/lisa.initrd \
            -append "root=/dev/vda2 rw console=ttyS0 systemd.unit=poweroff.target systemd.show_status=1" \
            -drive file=os/mkosi/lisa.raw,format=raw,if=virtio \
            | tee boot-console.log
          grep -q "Welcome to" boot-console.log
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: lisa-image
          path: os/mkosi/lisa*.raw
          if-no-files-found: warn
          retention-days: 7

  # M0 acceptance (PLAN §10): A/B update + rollback demonstrated. A
  # broken higher-version UKI with +2 try counters is preferred by
  # systemd-boot, fails twice (initrd timeout -> reboot), exhausts its
  # tries, and the good entry boots automatically. Real UEFI via OVMF —
  # this exercises systemd-boot itself, unlike the direct-kernel job.
  ab-rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: image
    steps:
      - name: Download built image
        uses: actions/download-artifact@v4
        with:
          name: lisa-image
      - name: Stage A/B demo UKIs in the ESP (mtools, no rebuild)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y --no-install-recommends \
            mtools fdisk jq binutils systemd-ukify systemd-boot-efi >/dev/null
          ls -l lisa*.raw
          # ESP = partition 1; mtools addresses it as an offset into the raw.
          OFF=$(( $(sfdisk -J lisa.raw | jq -r '.partitiontable.partitions[0].start') * 512 ))
          ESP="lisa.raw@@$OFF"
          NAME=$(mdir -b -i "$ESP" ::/EFI/Linux/ | grep -o 'lisa-[^/]*\.efi' | head -1)
          echo "good UKI: $NAME (ESP offset $OFF)"
          mcopy -i "$ESP" "::/EFI/Linux/$NAME" good.efi
          # The mkosi UKI carries no .cmdline section, so rebuild demo
          # variants properly with ukify from its kernel + initrd.
          objcopy --dump-section .linux=vmlinuz --dump-section .initrd=initrd.img good.efi discard.efi
          UKIFY=$(command -v ukify || echo /usr/lib/systemd/ukify)
          # Good entry: serial console + clean poweroff so QEMU exits on
          # success. No try counters = permanently valid entry.
          "$UKIFY" build --linux=vmlinuz --initrd=initrd.img \
            --cmdline='root=/dev/vda2 rw console=ttyS0 lisa_demo=good systemd.unit=poweroff.target' \
            --output=good-demo.efi
          # Bad entry: version 99 outranks the good entry. It boots but
          # immediately reboots (systemd.unit=reboot.target) without ever
          # reaching boot-complete — a deterministic failed boot that
          # burns a try per cycle. (A broken-root variant drops to an
          # emergency shell and hangs instead of rebooting.)
          "$UKIFY" build --linux=vmlinuz --initrd=initrd.img \
            --cmdline='root=/dev/vda2 rw console=ttyS0 lisa_demo=bad systemd.unit=reboot.target' \
            --output=bad-demo.efi
          mcopy -o -i "$ESP" good-demo.efi "::/EFI/Linux/$NAME"
          mcopy -i "$ESP" bad-demo.efi "::/EFI/Linux/lisa-99+2.efi"
          mdir -i "$ESP" ::/EFI/Linux/
          echo "ESP=$ESP" >>"$GITHUB_ENV"
      - name: Boot-counting rollback demo (UEFI QEMU)
        run: |
          set -o pipefail
          sudo apt-get install -qq -y --no-install-recommends qemu-system-x86 ovmf >/dev/null
          cp /usr/share/OVMF/OVMF_VARS_4M.fd vars.fd
          # No -no-reboot: the failed tries MUST reboot for the counters
          # to decrement. Success = good entry powers off -> QEMU exits.
          timeout 900 qemu-system-x86_64 \
            -machine q35 -accel kvm -accel tcg -m 4G -nographic \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd \
            -drive if=pflash,format=raw,file=vars.fd \
            -drive file=lisa.raw,format=raw,if=virtio \
            | tee console.log
          echo "--- assertions"
          # Two failed tries (bad entry reboots), then the good entry
          # powers off — in that order.
          RESTARTS=$(grep -c "reboot: Restarting system" console.log)
          [ "$RESTARTS" -eq 2 ]
          grep -q "reboot: Power down" console.log
          LAST_RESTART=$(grep -n "reboot: Restarting system" console.log | tail -1 | cut -d: -f1)
          POWEROFF=$(grep -n "reboot: Power down" console.log | tail -1 | cut -d: -f1)
          [ "$LAST_RESTART" -lt "$POWEROFF" ]
          grep -q "Welcome to" console.log
          # The smoking gun: systemd-boot renamed the bad entry's try
          # counters to +0-2 (two tries used, none left) in the ESP.
          mdir -b -i "$ESP" ::/EFI/Linux/ | tee esp-after.txt
          grep -q 'lisa-99+0-2.efi' esp-after.txt
          echo "ROLLBACK DEMO: PASS (2 failed tries, counters exhausted to +0-2, good entry booted and powered off)"

  # M0 acceptance (PLAN §10, ADR-0001): the update half of A/B. Boot v1,
  # let systemd-sysupdate pull a v2 (root partition image + UKI) over
  # HTTP from the runner, install it into the _empty slot, reboot, and
  # boot v2 from that slot. Asserted from the console sequence AND the
  # disk's state afterwards (slot relabeled root_2, lisa_2.efi in ESP).
  ab-sysupdate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: image
    steps:
      - name: Download built image
        uses: actions/download-artifact@v4
        with:
          name: lisa-image
      - name: Plant sysupdate config + demo scripts (loop mounts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y --no-install-recommends \
            fdisk jq binutils systemd-ukify systemd-boot-efi xz-utils >/dev/null
          LOOP=$(sudo losetup -P --show -f lisa.raw)
          echo "LOOP=$LOOP" >>"$GITHUB_ENV"
          mkdir -p mnt-root mnt-esp
          sudo mount "${LOOP}p2" mnt-root
          sudo mount "${LOOP}p1" mnt-esp

          # sysupdate transfers: root partition images by slot label,
          # UKIs by ESP filename. Verify=no: the M1 hosted repo signs.
          sudo mkdir -p mnt-root/etc/sysupdate.d mnt-root/efi
          sudo tee mnt-root/etc/sysupdate.d/50-root.conf >/dev/null <<'EOF'
          [Transfer]
          Verify=no
          [Source]
          Type=url-file
          Path=http://10.0.2.2:8000/
          MatchPattern=lisa_@v.root.xz
          [Target]
          Type=partition
          Path=auto
          MatchPattern=root_@v
          MatchPartitionType=root
          InstancesMax=2
          EOF
          sudo tee mnt-root/etc/sysupdate.d/60-uki.conf >/dev/null <<'EOF'
          [Transfer]
          Verify=no
          [Source]
          Type=url-file
          Path=http://10.0.2.2:8000/
          MatchPattern=lisa_@v.efi
          [Target]
          Type=regular-file
          Path=/EFI/Linux
          PathRelativeTo=esp
          MatchPattern=lisa_@v.efi
          InstancesMax=2
          EOF

          # QEMU user-net DHCP so the guest can reach the runner (10.0.2.2).
          sudo tee mnt-root/etc/systemd/network/99-demo-dhcp.network >/dev/null <<'EOF'
          [Match]
          Name=en*
          [Network]
          DHCP=yes
          EOF

          echo 1 | sudo tee mnt-root/etc/lisa-slot-version >/dev/null
          # One driver for both slots, branching on the version marker —
          # so the v2 root stays a byte-copy of v1 except that marker.
          # (systemd.run= is container-only; a real enabled unit is the
          # way to script a VM boot.)
          sudo tee mnt-root/usr/local/bin/lisa-demo.sh >/dev/null <<'EOF'
          #!/bin/bash
          v=$(cat /etc/lisa-slot-version)
          echo "LISA_SLOT_BOOTED=$v" > /dev/console
          if [ "$v" = "1" ]; then
              systemctl start systemd-networkd
              for _ in $(seq 1 60); do (echo > /dev/tcp/10.0.2.2/8000) 2>/dev/null && break; sleep 1; done
              if /usr/lib/systemd/systemd-sysupdate update > /tmp/sysupdate.log 2>&1; then
                  tail -5 /tmp/sysupdate.log > /dev/console
                  echo "LISA_UPDATE_DONE" > /dev/console
                  systemctl reboot
              else
                  tail -10 /tmp/sysupdate.log > /dev/console
                  echo "LISA_UPDATE_FAILED" > /dev/console
                  systemctl poweroff
              fi
          else
              systemctl poweroff
          fi
          EOF
          sudo chmod +x mnt-root/usr/local/bin/lisa-demo.sh
          sudo tee mnt-root/etc/systemd/system/lisa-demo.service >/dev/null <<'EOF'
          [Unit]
          Description=Lisa A/B sysupdate demo driver
          After=multi-user.target
          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/lisa-demo.sh
          EOF
          sudo mkdir -p mnt-root/etc/systemd/system/multi-user.target.wants
          sudo ln -sf ../lisa-demo.service mnt-root/etc/systemd/system/multi-user.target.wants/lisa-demo.service
          # systemd-firstboot prompts interactively on first boot and
          # blocks the console; the demo has no user.
          sudo ln -sf /dev/null mnt-root/etc/systemd/system/systemd-firstboot.service

          # Demo UKIs from the shipped kernel+initrd: v1 runs the update
          # then reboots; v2 boots the B slot and powers off.
          NAME=$(ls mnt-esp/EFI/Linux/ | grep '^lisa-.*\.efi$' | head -1)
          objcopy --dump-section .linux=vmlinuz --dump-section .initrd=initrd.img "mnt-esp/EFI/Linux/$NAME" discard.efi
          UKIFY=$(command -v ukify || echo /usr/lib/systemd/ukify)
          "$UKIFY" build --linux=vmlinuz --initrd=initrd.img \
            --cmdline='root=/dev/vda2 rw console=ttyS0' \
            --output=lisa_1.efi
          "$UKIFY" build --linux=vmlinuz --initrd=initrd.img \
            --cmdline='root=/dev/vda3 rw console=ttyS0' \
            --output=lisa_2.efi
          sudo rm "mnt-esp/EFI/Linux/$NAME"
          sudo cp lisa_1.efi mnt-esp/EFI/Linux/lisa_1.efi

          sudo umount mnt-esp mnt-root

          # v2 root = byte-copy of slot A with a bumped version marker.
          sudo dd if="${LOOP}p2" of=root2.img bs=4M status=none
          sudo chown "$USER:" root2.img
          mkdir -p mnt-v2
          sudo mount -o loop root2.img mnt-v2
          echo 2 | sudo tee mnt-v2/etc/lisa-slot-version >/dev/null
          sudo umount mnt-v2
          xz -T0 -1 root2.img
          mkdir -p serve
          mv root2.img.xz serve/lisa_2.root.xz
          cp lisa_2.efi serve/
          # sysupdate enumerates available versions via the SHA256SUMS
          # manifest even with Verify=no (that flag only skips GPG).
          (cd serve && sha256sum lisa_2.root.xz lisa_2.efi > SHA256SUMS)
          sudo losetup -d "$LOOP"
          ls -lh serve/
      - name: Update + reboot into slot B (UEFI QEMU)
        run: |
          set -o pipefail
          [ -e /dev/kvm ] && sudo chmod 666 /dev/kvm
          sudo apt-get install -qq -y --no-install-recommends qemu-system-x86 ovmf >/dev/null
          (cd serve && python3 -m http.server 8000 >/dev/null 2>&1 &)
          cp /usr/share/OVMF/OVMF_VARS_4M.fd vars.fd
          timeout 900 qemu-system-x86_64 \
            -machine q35 -accel kvm -accel tcg -m 4G -nographic \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd \
            -drive if=pflash,format=raw,file=vars.fd \
            -drive file=lisa.raw,format=raw,if=virtio \
            | tee console.log
          echo "--- assertions"
          V1=$(grep -n "LISA_SLOT_BOOTED=1" console.log | head -1 | cut -d: -f1)
          DONE=$(grep -n "LISA_UPDATE_DONE" console.log | head -1 | cut -d: -f1)
          V2=$(grep -n "LISA_SLOT_BOOTED=2" console.log | head -1 | cut -d: -f1)
          [ -n "$V1" ] && [ -n "$DONE" ] && [ -n "$V2" ]
          [ "$V1" -lt "$DONE" ] && [ "$DONE" -lt "$V2" ]
          grep -q "reboot: Power down" console.log
          # Disk state: the empty slot is now labeled root_2 and the ESP
          # carries the v2 UKI.
          sfdisk -J lisa.raw | jq -r '.partitiontable.partitions[].name' | tee labels.txt
          grep -qx "root_2" labels.txt
          OFF=$(( $(sfdisk -J lisa.raw | jq -r '.partitiontable.partitions[0].start') * 512 ))
          sudo apt-get install -qq -y mtools >/dev/null
          mdir -b -i "lisa.raw@@$OFF" ::/EFI/Linux/ | grep -q 'lisa_2.efi'
          echo "SYSUPDATE DEMO: PASS (v1 booted, update installed to slot B, v2 booted from root_2)"
