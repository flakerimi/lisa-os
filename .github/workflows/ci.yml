name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Per-job path filtering (ADR-0006): docs-only commits skip the heavy
  # jobs; the layer e2e additionally reacts to os/** changes.
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      layer: ${{ steps.filter.outputs.layer }}
      shell: ${{ steps.filter.outputs.shell }}
      ime: ${{ steps.filter.outputs.ime }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'libs/**'
              - 'daemons/**'
              - 'cli/**'
              - 'models/**'
              - 'tests/e2e/**'
              - '.github/workflows/ci.yml'
            layer:
              - 'os/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'libs/**'
              - 'daemons/**'
              - 'cli/**'
              - 'models/**'
              - 'tests/e2e/**'
              - '.github/workflows/ci.yml'
            shell:
              - 'shell/**'
              - '.github/workflows/ci.yml'
            ime:
              - 'ime/**'
              - '.github/workflows/ci.yml'

  lint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  # PLAN §5.7 shell surfaces: pure-logic unit tests (overlay envelope,
  # launcher ranking, ledger view-model) — runtime-agnostic modules run
  # under node here, gjs on the image, jsc on macOS dev hosts.
  shell-tests:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    steps:
      - uses: actions/checkout@v5
      - run: |
          for t in shell/*/tests/*.test.js; do
            echo "== $t"
            node "$t"
          done

  # PLAN §5.7.3 layer 2 (ADR-0007): compile the fcitx5 addon against
  # real Fcitx5Core headers in an Arch container and run the protocol
  # unit tests.
  ime-build:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ime == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Build addon + run protocol tests in Arch
        run: |
          sudo podman run --rm -v "$PWD":/src docker.io/library/archlinux:latest bash -ec '
            pacman -Sy --noconfirm --needed base-devel cmake fcitx5 >/dev/null
            cmake -S /src/ime/fcitx5-lisa -B /tmp/build
            cmake --build /tmp/build
            cd /tmp/build && ctest --output-on-failure'

  # PLAN §5.1 acceptance forerunner: unmodified OpenAI Python client
  # against the OpenAI-compat endpoint.
  openai-compat:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked -p lisa-inferenced
      - name: Start daemon
        run: |
          ./target/debug/lisa-inferenced &
          for _ in $(seq 1 50); do
            curl -sf 127.0.0.1:7777/health >/dev/null && break
            sleep 0.2
          done
      - run: pip install openai
      - run: python tests/e2e/openai_client_test.py

  # PLAN §5.10: egress control is verified, not promised — the daemon
  # serves loopback under its unit sandbox while outbound is blocked.
  egress:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked -p lisa-inferenced
      - run: bash tests/e2e/egress-test.sh target/debug/lisa-inferenced

  # PLAN §10 M0 acceptance: the Track L layer installs and uninstalls
  # cleanly on vanilla Arch (systemd container; Omarchy VM lands later).
  layer-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: changes
    if: needs.changes.outputs.layer == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Start Arch container with systemd
        run: |
          # --privileged: the runner's default seccomp/AppArmor confinement
          # kills dbus-broker's launcher child, crashlooping the system bus
          # and wedging PID1 (throwaway CI container; the image job already
          # runs privileged for the same reason).
          sudo podman run -d --name lisa-e2e --privileged --systemd=always -v "$PWD":/src:ro \
            docker.io/library/archlinux:latest /usr/lib/systemd/systemd
          # systemd on runners can take several 90 s job-timeout cycles to
          # settle; require running|degraded before testing — piling work
          # onto an "initializing" PID1 is what produced the endless hangs.
          if ! timeout 300 sudo podman exec lisa-e2e bash -c \
            'until systemctl is-system-running 2>/dev/null | grep -qE "running|degraded"; do sleep 2; done'; then
            echo "::error::systemd never settled; boot journal follows"
            # journalctl reads journal files directly — works even when
            # PID1's bus is unresponsive.
            sudo podman exec lisa-e2e journalctl -b --no-pager | tail -150 || true
            exit 1
          fi
          sudo podman exec lisa-e2e systemctl list-units --failed --no-pager || true
      - name: Run layer e2e
        run: sudo podman exec lisa-e2e bash /src/tests/e2e/layer-test.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          sudo podman exec lisa-e2e systemctl list-jobs --no-pager || true
          sudo podman exec lisa-e2e systemctl list-units --failed --no-pager || true
          sudo podman exec lisa-e2e systemctl status lisa-inferenced.service --no-pager -l || true
          sudo podman exec lisa-e2e journalctl --no-pager -n 100 || true
      - name: Cleanup
        if: always()
        run: sudo podman rm -f lisa-e2e
