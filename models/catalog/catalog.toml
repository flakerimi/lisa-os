# Lisa OS model catalog — SEED DATA, NOT LAW (docs/PLAN.md §0.4, §7).
# Verify current best-in-class models at build time; this file records the
# July 2026 planning lineup. `source`/`blake3` stay unset until M1 pins the
# exact artifacts after license review — placeholder URLs are never invented.
#
# In production this index is fetched signed (TUF-style) and refreshed
# daily; `revoked = true` quarantines a model (PLAN §5.10).

catalog_version = 1

[[model]]
# On-device chat model with a verified load. Gemma's license is
# weights-available but restrictive — a clearly-labeled option, never a
# silent default (PLAN §7). ~1 GiB, runs on the tier-0 floor.
id = "gemma-3-1b-it-q8"
task = "system"
tiers = [0, 1]
license = "Gemma-Terms-of-Use"
engine = "llama-server"
source = "https://huggingface.co/ggml-org/gemma-3-1b-it-GGUF/resolve/main/gemma-3-1b-it-Q8_0.gguf"
blake3 = "109f719b11458bcacb9809e221ae8170b9e0b991209a33e819f1908d04b3e7c8"
min_ram_gb = 2
notes = "Gemma 3 1B (ggml-org GGUF, ungated). Verified loads + generates 2026-07-22. License: ai.google.dev/gemma/terms — accept before use."

